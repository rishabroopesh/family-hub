name: FamilyHub
options:
  bundleIdPrefix: com.vtpct
  deploymentTarget:
    iOS: "17.0"

targets:
  FamilyHub:
    type: application
    platform: iOS
    sources:
      - path: FamilyHub
        excludes:
          - "**/*.xcodeproj"
          - "**/*.xcodeproj/**"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: VTPCT.FamilyHub
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_GENERATION_MODE: GeneratedFile
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "1"
      SWIFT_VERSION: "5.0"
      TARGETED_DEVICE_FAMILY: "1,2"
