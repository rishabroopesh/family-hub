version: "3.8"

services:
  # ---------- PostgreSQL ----------
  db:
    image: postgres:16-alpine
    container_name: familyhub-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-familyhub}
      POSTGRES_USER: ${POSTGRES_USER:-familyhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-familyhub}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - familyhub-net

  # ---------- Redis ----------
  redis:
    image: redis:7-alpine
    container_name: familyhub-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - familyhub-net

  # ---------- Django Backend ----------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: familyhub-backend
    restart: unless-stopped
    command: /app/entrypoint.sh
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - DATABASE_URL=postgres://${POSTGRES_USER:-familyhub}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-familyhub}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SECRET_KEY=${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY in .env}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-http://localhost:8000/api/v1/auth/google/callback/}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - backend_static:/app/static
      - backend_media:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - familyhub-net

  # ---------- Celery Worker ----------
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: familyhub-celery-worker
    restart: unless-stopped
    command: celery -A config worker -l info --concurrency=2
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - DATABASE_URL=postgres://${POSTGRES_USER:-familyhub}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-familyhub}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SECRET_KEY=${DJANGO_SECRET_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - familyhub-net

  # ---------- Celery Beat ----------
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: familyhub-celery-beat
    restart: unless-stopped
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - DATABASE_URL=postgres://${POSTGRES_USER:-familyhub}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-familyhub}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SECRET_KEY=${DJANGO_SECRET_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - familyhub-net

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/user/appdata/familyhub/postgres
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/user/appdata/familyhub/redis
  backend_static:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/user/appdata/familyhub/static
  backend_media:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/user/appdata/familyhub/media

networks:
  familyhub-net:
    driver: bridge
    name: familyhub-net
